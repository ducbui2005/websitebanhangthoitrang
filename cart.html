<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng | FashionHub</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">FASHION<span>HUB</span></div>
        <div class="nav-icons">
            <a href="wishlist.html" id="wishlist-icon" style="position: relative; color: inherit; text-decoration: none; margin-right: 20px;">
                <i class="fa-regular fa-heart"></i>
                <span class="wishlist-badge">0</span>
            </a>
            <a href="cart.html" id="cart-icon" style="position: relative; color: inherit; text-decoration: none;">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge">0</span>
            </a>
        </div>
    </nav>

    <main class="wishlist-container">
        <h2 class="wishlist-header">🛒 Giỏ hàng của <span>bạn</span></h2>
        
        <div id="cart-content">
            </div>

        <div id="empty-cart" style="display:none; text-align: center; padding: 50px;">
            <p>Giỏ hàng đang trống!</p>
            <a href="index.html" class="btn-buy-now" style="display:inline-block; margin-top:20px; text-decoration:none; padding: 10px 30px;">Tiếp tục mua sắm</a>
        </div>
    </main>

    <script src="./data.js"></script>
    <script src="./cart.js"></script>
</body>
</html>
