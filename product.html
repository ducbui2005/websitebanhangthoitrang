<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store | Modern E-commerce</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

   <nav class="navbar">
    <div class="logo">FASHION<span>HUB</span></div>
    <ul class="nav-links">
        <li><a href="./main.html" class="active">Trang chủ</a></li>
        <li><a href="./product.html">Sản phẩm</a></li>
        <li><a href="./collection.html">Bộ sưu tập</a></li>
    </ul>
    <div class="nav-icons">
        <div class="search-box">
            <input type="text" placeholder="Tìm kiếm...">
            <i class="fa-solid fa-magnifying-glass"></i>
            <div id="search-suggestions" class="search-suggestions"></div>
        </div>

        <div class="nav-item-wrapper">
            <a href="wishlist.html">
                <i class="fa-regular fa-heart" id="wishlist-icon"><span>0</span></i>
            </a>
            <div class="nav-dropdown" id="mini-wishlist">
                <p class="empty-msg">Chưa có sản phẩm yêu thích</p>
            </div>
        </div>

        <div class="nav-item-wrapper">
            <a href="cart.html">
                <i class="fa-solid fa-cart-shopping" id="cart-icon"><span>0</span></i>
            </a>
            <div class="nav-dropdown" id="mini-cart">
                <p class="empty-msg">Giỏ hàng trống</p>
            </div>
        </div>

        <i class="fa-regular fa-user" id="login-btn"></i>
    </div>
</nav>
    <main class="container">
        <aside class="sidebar">
            <h3>Bộ lọc</h3>
            <div class="filter-group">
                <h4>Giá</h4>
                <select id="price-filter">
                    <option value="all">Tất cả</option>
                    <option value="low">Dưới 500.000đ</option>
                    <option value="high">Trên 500.000đ</option>
                </select>
            </div>
            <div class="filter-group">
                <h4>Danh mục</h4>
                <button class="filter-btn active" data-category="all">Tất cả</button>
                <button class="filter-btn" data-category="shirt">Áo</button>
                <button class="filter-btn" data-category="pants">Quần</button>
            </div>
        </aside>

        <section class="products-grid" id="product-list">
            </section>
    </main>
    <div id="login-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="login-box">
            <h2>Đăng Nhập</h2>
            <form id="login-form">
                <div class="input-group">
                    <label>Email hoặc Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập email của bạn" required>
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
                <p class="login-footer">Chưa có tài khoản? <a href="#">Đăng ký ngay</a></p>
            </form>
        </div>
    </div>
</div>
    <script src="./data.js"></script>
    <script src="main.js"></script>
</body>
</html>
